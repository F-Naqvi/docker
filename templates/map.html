<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>presence</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Zen+Kaku+Gothic+New:wght@300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #0d1117;
      --text:      #c8dce6;
      --text-dim:  #7aaabb;
      --text-ghost:#4a7a8a;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      cursor: none;
    }

    .cursor {
      position: fixed;
      width: 6px; height: 6px;
      background: rgba(140, 190, 210, 0.6);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 10px rgba(140,190,210,0.4);
    }

    #map {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0;
      transition: opacity 2s ease;
    }

    #map.visible { opacity: 1; }

    /* Hide all leaflet UI */
    .leaflet-control-container { display: none; }
    .leaflet-attribution-flag  { display: none !important; }

    /* Vignette — strong on edges so map bleeds into bg */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 5;
      background: radial-gradient(ellipse at center, transparent 35%, rgba(8,12,16,0.6) 65%, rgba(6,10,14,0.95) 100%);
      pointer-events: none;
    }

    /* Top edge fade */
    .fade-top {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 120px;
      z-index: 6;
      background: linear-gradient(to bottom, rgba(8,12,16,1) 0%, transparent 100%);
      pointer-events: none;
    }

    /* Bottom edge fade */
    .fade-bottom {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 120px;
      z-index: 6;
      background: linear-gradient(to top, rgba(8,12,16,1) 0%, transparent 100%);
      pointer-events: none;
    }

    /* Nav links */
    .back {
      position: fixed;
      top: 2rem;
      left: 0; right: 0;
      display: block;
      text-align: center;
      z-index: 10;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 300;
      font-size: 0.55rem;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--text-ghost);
      text-decoration: none;
      transition: color 0.4s ease;
      animation: fadein 5s ease forwards;
      opacity: 0;
    }

    .back:hover { color: var(--text-dim); }

    /* Label */
    .label {
      position: fixed;
      bottom: 2.8rem;
      left: 0; right: 0;
      text-align: center;
      z-index: 10;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      color: var(--text-ghost);
      animation: fadein 6s ease forwards;
      opacity: 0;
      pointer-events: none;
    }

    @keyframes fadein {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }

    /* Pulsing dot marker */
    .presence-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: rgba(140, 190, 210, 0.9);
      box-shadow: 0 0 12px rgba(140,190,210,0.8), 0 0 30px rgba(140,190,210,0.4);
      animation: presence-pulse 3s ease-in-out infinite;
      position: relative;
    }

    .presence-dot::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 1px solid rgba(140,190,210,0.4);
      animation: presence-ring 3s ease-out infinite;
    }

    @keyframes presence-pulse {
      0%,100% { box-shadow: 0 0 12px rgba(140,190,210,0.8), 0 0 30px rgba(140,190,210,0.4); opacity: 0.9; }
      50%      { box-shadow: 0 0 20px rgba(140,190,210,1),   0 0 50px rgba(140,190,210,0.6); opacity: 1; }
    }

    @keyframes presence-ring {
      0%   { width: 12px; height: 12px; opacity: 0.6; }
      100% { width: 48px; height: 48px; opacity: 0; }
    }

    /* Loading state */
    .locating {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 0.9rem;
      letter-spacing: 0.25em;
      color: var(--text-ghost);
      animation: fadein 1s ease forwards;
      opacity: 0;
      transition: opacity 1s ease;
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>

  <div id="map"></div>

  <div class="vignette"></div>
  <div class="fade-top"></div>
  <div class="fade-bottom"></div>

  <a href="/" class="back">← return to stillness</a>
  <div class="label" id="label">finding you</div>

  <div class="locating" id="locating">locating presence...</div>

  <script>
    // Cursor
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
    });

    // Init map — dark matter tiles
    const map = L.map('map', {
      zoomControl:        false,
      attributionControl: false,
      dragging:           false,
      scrollWheelZoom:    false,
      doubleClickZoom:    false,
      touchZoom:          false,
      keyboard:           false,
    }).setView([20, 0], 2);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd',
      maxZoom: 19,
    }).addTo(map);

    // Custom dot marker
    const dotIcon = L.divIcon({
      className: '',
      html: '<div class="presence-dot"></div>',
      iconSize: [12, 12],
      iconAnchor: [6, 6],
    });

    // Fetch location from IP — no permission needed, city-level
    fetch('https://ipapi.co/json/')
      .then(r => r.json())
      .then(data => {
        const lat = data.latitude;
        const lng = data.longitude;
        const city = data.city || 'somewhere';

        // Fly to location smoothly
        map.flyTo([lat, lng], 9, { duration: 3, easeLinearity: 0.1 });

        setTimeout(() => {
          L.marker([lat, lng], { icon: dotIcon }).addTo(map);
          document.getElementById('map').classList.add('visible');
          document.getElementById('locating').style.opacity = '0';
          document.getElementById('label').textContent = `you are here. for now.`;
        }, 1500);
      })
      .catch(() => {
        // Fallback — just show the world map
        document.getElementById('map').classList.add('visible');
        document.getElementById('locating').style.opacity = '0';
        document.getElementById('label').textContent = 'presence undetected.';
      });
  </script>
</body>
</html>
